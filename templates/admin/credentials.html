<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Investor Credentials</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif; max-width:760px; margin:30px auto; padding:0 12px;}
    .card{border:1px solid #ddd; border-radius:10px; padding:16px; margin:12px 0;}
    .row{display:flex; gap:10px; margin:10px 0; align-items:center;}
    label{min-width:110px; color:#444}
    input{flex:1; padding:10px; border:1px solid #ccc; border-radius:8px;}
    button{padding:10px 14px; border:1px solid #333; border-radius:8px; background:#111; color:#fff; cursor:pointer;}
    .muted{color:#666; font-size:13px;}
    .ok{color:#0a7a2f; font-size:13px; margin:8px 0;}
    .err{color:#b00020; font-size:13px; margin:8px 0;}
    a{color:#0b66c3; text-decoration:none;}
  </style>
</head>
<body>
  {% include "admin/_nav.html" %}
  <h2>Investor Credentials</h2>

  <div class="muted">
    Investor #{{ inv.id }} · {{ inv.name }} · {{ inv.email }}
  </div>

  <div class="card">
    {% if msg == "ok" %}
      <div class="ok">Saved.</div>
    {% elif msg == "bad" %}
      <div class="err">Please enter username and password.</div>
    {% elif msg == "dup" %}
      <div class="err">Username already taken.</div>
    {% endif %}

    <form method="post" action="/admin/investors/{{ inv.id }}/credentials">
      <div class="row">
        <label>Username</label>
        <input name="username" placeholder="username" value="{{ inv.username or '' }}" required>
      </div>

      <div class="row">
        <label>Password</label>
        <input name="password" type="password" placeholder="new password" required>
      </div>

      <div class="row">
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <div class="muted">
    <a href="/admin/investors">← Back to Investors</a>
  </div>
</body>
</html>
