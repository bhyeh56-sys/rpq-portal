<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Investors</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; }
    th { background: #f5f5f5; }
    .row { display:flex; gap:12px; align-items:center; margin: 8px 0; }
    input { padding: 6px; }
    .badge { padding:2px 8px; border-radius: 4px; background:#e0e0e0; }
    .inactive { background:#f8d7da; }
    button { padding: 4px 10px; cursor:pointer; }
  </style>
</head>
<body>

<h2>Investors</h2>

<form method="get" action="/admin/investors">
  <div class="row">
    <input name="q" placeholder="Search name or email" value="{{ q }}">
    <label>
      <input type="checkbox" name="include_inactive" value="true"
        {% if include_inactive %}checked{% endif %}>
      include inactive
    </label>
    <button type="submit">Search</button>
  </div>
</form>

<h3>Create Investor</h3>
<form
  hx-post="/admin/investors"
  hx-headers='{"X-Admin-Id":"1"}'
  hx-target="#investors-body"
  hx-swap="afterbegin"
>
  <div class="row">
    <input name="name" placeholder="Name" required>
    <input name="email" placeholder="Email" required>
    <input name="memo" placeholder="Memo">
    <button type="submit">Create</button>
  </div>
</form>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="investors-body">
    {% for inv in investors %}
      {% include "admin/investor_row.html" %}
    {% endfor %}
  </tbody>
</table>

</body>
</html>
