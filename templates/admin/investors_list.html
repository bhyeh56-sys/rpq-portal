<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Investors</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 36px 28px; }
    h2 { margin: 0 0 14px 0; }
    h3 { margin: 18px 0 10px 0; font-size: 16px; }

    table { border-collapse: collapse; width: 100%; margin-top: 14px; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; vertical-align: middle; }
    th { background: #f5f5f5; text-align: left; }

    .row { display:flex; flex-wrap: wrap; gap:12px; align-items:center; margin: 10px 0; }
    input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; }
    .badge { padding:2px 8px; border-radius: 999px; background:#e9ecef; font-size: 12px; }
    .inactive { background:#f8d7da; }
    button { padding: 7px 12px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; cursor:pointer; }
    button.secondary { background: #fff; color:#111; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .col-id { width: 70px; }
    .col-status { width: 110px; }
    .col-action { width: 150px; }
    .col-username { width: 160px; }
    .col-cred { width: 120px; }
  </style>
  {% include "_mobile.html" %}
</head>
<body>
<div class="wrap">
  {% include "admin/_nav.html" %}

  <h2>Investors</h2>

  <form method="get" action="/admin/investors">
    <div class="row">
      <input name="q" placeholder="Search name or email" value="{{ q }}">
      <label style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" name="include_inactive" value="true"
          {% if include_inactive %}checked{% endif %}>
        include inactive
      </label>
      <button type="submit" class="secondary">Search</button>
    </div>
  </form>

  <h3>Create Investor</h3>
  <form
    hx-post="/admin/investors"
    hx-target="#investors-body"
    hx-swap="afterbegin"
  >
    <div class="row">
      <input name="name" placeholder="Name" required>
      <input name="email" placeholder="Email" required>
      <input name="memo" placeholder="Memo">
      <button type="submit">Create</button>
    </div>
  </form>

  <div class="table-scroll">
  <table>
    <thead>
      <tr>
        <th class="col-id">ID</th>
        <th>Name</th>
        <th>Email</th>
        <th class="col-status">Status</th>
        <th class="col-action">Action</th>
        <th class="col-username">Username</th>
        <th class="col-cred">Credentials</th>
      </tr>
    </thead>
    <tbody id="investors-body">
      {% for inv in investors %}
        {% include "admin/investor_row.html" %}
      {% endfor %}
    </tbody>
  </table>
  </div>

</div>
</body>
</html>
