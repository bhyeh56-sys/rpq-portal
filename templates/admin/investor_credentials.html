<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Set Investor Credentials</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif; max-width:720px; margin:24px auto; padding:0 12px;}
    .card{border:1px solid #ddd; border-radius:12px; padding:14px; margin:12px 0;}
    input{width:100%; padding:10px; border:1px solid #ccc; border-radius:10px;}
    button{padding:10px 14px; border:0; border-radius:10px; cursor:pointer;}
    .row{margin:10px 0;}
    .muted{color:#666; font-size:13px;}
  </style>
</head>
<body>
  <h2>Set Credentials</h2>
  <div class="muted">investor_id={{ investor_id }}</div>

  <div class="card">
    <form method="post" action="/admin/investors/{{ investor_id }}/credentials">
      <div class="row">
        <input name="username" placeholder="Username (unique)" required>
      </div>
      <div class="row">
        <input name="password" type="password" placeholder="Temporary password" required>
      </div>
      <div class="row">
        <button type="submit">Save</button>
      </div>
    </form>
    <div class="muted">
      Provide this username/password to the investor offline. They can login at /portal.
    </div>
  </div>

  <div><a href="/admin/investors">← back</a></div>
</body>
</html>
